syntax = "proto3";

package hannah;

option go_package = "dev.kernstock.net/gessinger/voice/hannah/proxy/proto/hannah";

// Sent by Hannah Core over the TimerConnect stream.
message TimerCommand {
  oneof command {
    TimerCreate      create    = 1;  // create a new timer
    TimerCancel      cancel    = 2;  // cancel an existing timer
    TimerListRequest list      = 3;  // request current timer list
    TimerReady       ready     = 4;  // Hannah is ready to receive pending fired events
    TimerNotReady    not_ready = 5;  // Hannah is temporarily unable to process timer firings
  }
}

// Hannah signals that she is ready to receive queued TimerFired events.
// Sent after startup once ioBroker states are loaded. The service flushes
// any TimerFired events that occurred while Hannah was offline, in order.
message TimerReady {}

// Hannah signals a temporary degraded state — the Timer Service should hold
// any TimerFired events in its queue until a subsequent TimerReady is received.
// Hannah sends this when core subsystems are unavailable (e.g. ioBroker disconnected).
message TimerNotReady {
  optional string reason = 1;  // human-readable reason, e.g. "ioBroker disconnected"
}

// Hannah instructs the timer service to create a new timer.
message TimerCreate {
  string           timer_id  = 1;  // UUID assigned by Hannah
  string           label     = 2;  // human-readable label, e.g. "Spazieren gehen"
  int64            fire_at   = 3;  // Unix timestamp (seconds) when to fire
  string           room      = 4;  // room to announce in, or "all"
  optional string  roomie_id = 5;  // optional: which user set the timer
}

// Hannah instructs the timer service to cancel a timer.
message TimerCancel {
  string timer_id = 1;
}

// Hannah requests the current list of active timers (e.g. "welche Timer habe ich?").
message TimerListRequest {}

// Sent by the Timer Service over the TimerConnect stream.
message TimerMessage {
  oneof payload {
    TimerAck          ack   = 1;  // initial confirmation when stream is established
    TimerFired        fired = 2;  // a timer has expired
    TimerListResponse list  = 3;  // response to TimerListRequest
  }
}

// Sent once by the Timer Service after TimerConnect stream is established.
message TimerAck {
  string message       = 1;  // human-readable status
  int32  active_timers = 2;  // number of timers currently tracked
}

// Timer Service notifies Hannah that a timer has expired.
// Hannah looks up the timer_id in its own store to determine what to announce and where.
message TimerFired {
  string timer_id = 1;
  string label    = 2;  // convenience copy for logging; Hannah has it in its own store
}

// Response to TimerListRequest — used for sync and "welche Timer habe ich?" queries.
message TimerListResponse {
  repeated TimerInfo timers = 1;
}

message TimerInfo {
  string           timer_id  = 1;
  string           label     = 2;
  int64            fire_at   = 3;  // Unix timestamp (seconds)
  string           room      = 4;
  optional string  roomie_id = 5;
}
