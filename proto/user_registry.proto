syntax = "proto3";

package hannah;

option go_package = "dev.kernstock.net/gessinger/voice/hannah/proxy/proto/hannah";

import "agent.proto";

message User {
  int32  id              = 1;
  string user_name       = 2;
  string display_name    = 3;
  int32  trust_level     = 4;
  bool   active          = 5;
  // linked_accounts: service → account_id  (e.g. "telegram" → "123456789")
  map<string, string> linked_accounts = 6;
  bool   system_messages = 7;  // receives ioBroker/system notifications via Telegram
  string email           = 8;  // #27 Phase 6
  string type            = 9;  // "roomie" | "guest" | "pet", #27 Phase 6
}

message GetUsersRequest {
  bool include_inactive = 1;
}

message GetUsersResponse {
  repeated User users = 1;
}

// Exactly one of the lookup fields should be set.
message GetUserRequest {
  oneof lookup {
    string                user_name      = 1;
    int32                 id             = 2;
    LinkedAccountLookup   linked_account = 3;
  }
  // Only meaningful together with roomie_id: roomie_id alone is not unique across
  // types (a Guest and a Roomie can share a name). Leave UNSPECIFIED if there's no
  // collision; required when one exists, otherwise the RPC fails with
  // FAILED_PRECONDITION naming the colliding types.
  ResidentType type = 4;
}

message LinkedAccountLookup {
  string provider    = 1;
  string external_id = 2;
}

message UserResponse {
  bool found = 1;
  User user  = 2;  // only valid when found == true
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LinkAccountRequest {
  int32  user_id          = 1;
  string service          = 2;
  string account_id       = 3;
  string provider_payload  = 4;
}

message UnlinkAccountRequest {
  int32  user_id       = 1;
  string service       = 2;
  string account_id    = 3;
  int32  requestor_id  = 4;
}

message SetTrustLevelRequest {
  int32  user_id    = 1;
  int32  level      = 2;  // clamped to [0, 10]
}

message SetSystemMessagesRequest {
  // Always called by the user for themselves, identified beforehand via a unique
  // linked-account lookup (GetUserRequest.linked_account) — id is already known
  // and unambiguous, unlike roomie_id which can collide across resident types.
  int32  user_id  = 1;
  bool   enabled  = 2;
}

// --- User-Verwaltung (Admin-UI, #27 Phase 6) ---

message CreateUserRequest {
  string username     = 1;
  string password     = 2;  // Klartext, wird serverseitig gehasht — gleicher akzeptierter Constraint wie LoginRequest
  string email        = 3;
  string display_name = 4;
  string type         = 5;  // "roomie" | "guest" | "pet"
}

message CreateUserResponse {
  bool   ok      = 1;
  int32  id      = 2;  // server-assigned, only valid when ok == true
  string message = 3;
}

message UpdateUserRequest {
  int32  user_id      = 1;
  string display_name = 2;
  string email        = 3;
  string type         = 4;
  bool   is_active    = 5;
  string password     = 6;  // Klartext, "" = unverändert
}

message DeleteUserRequest {
  int32 user_id = 1;
}

message Resident {
  string id           = 1;  // z.B. "leonie_roomie" — roomie_id + "_" + type
  string roomie_id    = 2;
  string display_name = 3;
  string type         = 4;  // "roomie" | "guest" | "pet"
  bool   home         = 5;
}

message GetResidentsResponse {
  repeated Resident residents = 1;
}
