syntax = "proto3";

package hannah;

option java_package = "io.hannah";
option java_outer_classname = "HannahProto";

option go_package = "dev.kernstock.net/gessinger/voice/hannah/proxy/proto/hannah";

// ============================================================
//  Hannah gRPC Service
//
//  Allows external services (Telegram bot, web UI, etc.) to:
//    - query and manage the user registry
//    - submit text commands and receive answers
//    - trigger TTS announcements on satellites
//    - inspect registered satellites
//    - query live car state
//    - subscribe to a stream of Hannah events (car parked, resident arrived, …)
//    - register as a satellite audio proxy (Go gRPC proxy replaces UDP server)
// ============================================================

service HannahService {

  // --- User Registry ---
  rpc GetUsers      (GetUsersRequest)      returns (GetUsersResponse);
  rpc GetUser       (GetUserRequest)       returns (UserResponse);
  rpc LinkAccount   (LinkAccountRequest)   returns (StatusResponse);
  rpc UnlinkAccount (UnlinkAccountRequest) returns (StatusResponse);
  rpc SetTrustLevel       (SetTrustLevelRequest)       returns (StatusResponse);
  rpc SetSystemMessages   (SetSystemMessagesRequest)   returns (StatusResponse);
  rpc Login               (LoginRequest)               returns (UserResponse);

  // --- User-Verwaltung (Admin-UI, #27 Phase 6) ---
  rpc CreateUser   (CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser   (UpdateUserRequest) returns (StatusResponse);
  rpc DeleteUser   (DeleteUserRequest) returns (StatusResponse);
  // Residents (Roomies/Guests/Pets) aus dem ioBroker-Adapter-Cache — fürs "Resident verknüpfen"-Dropdown.
  rpc GetResidents (Empty)            returns (GetResidentsResponse);

  // --- Device Control Menu ---
  // Returns all rooms and devices with current state — for building control menus.
  rpc GetDevices    (Empty)                returns (GetDevicesResponse);
  // Directly set a device state (bypasses NLU). Trust level check is done by the caller.
  rpc ControlDevice (ControlDeviceRequest) returns (StatusResponse);

  // --- Control ---
  // Submit a plain-text command; Hannah processes it through NLU and returns the answer.
  rpc SubmitText    (SubmitTextRequest)    returns (SubmitTextResponse);
  // Submit a voice message (OGG/Opus bytes); Hannah does STT → NLU → TTS and returns the result.
  rpc SubmitVoice   (SubmitVoiceRequest)   returns (SubmitVoiceResponse);
  // Send a TTS announcement to one satellite or all ("all").
  rpc Announce      (AnnounceRequest)      returns (StatusResponse);
  // Send a notification from ioBroker to Hannah. Returns ok=true when queued.
  // direct=true: skip LLM reformulation. severity: "alert"|"notify"|"info".
  rpc Notify        (AgentNotification)    returns (StatusResponse);
  // List all known satellites (DB + live status merged).
  rpc GetSatellites (Empty)               returns (GetSatellitesResponse);

  // --- Satellites (Admin-UI, #27 Phase 2) ---
  rpc SetSatelliteRoom        (SetSatelliteRoomRequest)        returns (StatusResponse);
  rpc SetSatelliteDisplayName (SetSatelliteDisplayNameRequest) returns (StatusResponse);

  // --- Rooms/Groups (Admin-UI, #27 Phase 1) ---
  rpc GetRooms      (Empty)                returns (GetRoomsResponse);
  rpc GetGroups     (Empty)                returns (GetGroupsResponse);
  rpc CreateGroup   (CreateGroupRequest)   returns (StatusResponse);
  rpc UpdateGroup   (UpdateGroupRequest)   returns (StatusResponse);
  rpc DeleteGroup   (DeleteGroupRequest)   returns (StatusResponse);
  rpc SetGroupRooms (SetGroupRoomsRequest) returns (StatusResponse);

  // --- Routines/Triggers (Admin-UI, #27 Phase 4) ---
  rpc GetRoutines   (Empty)                returns (GetRoutinesResponse);
  rpc CreateRoutine (CreateRoutineRequest) returns (CreateRoutineResponse);
  rpc UpdateRoutine (UpdateRoutineRequest) returns (StatusResponse);
  rpc DeleteRoutine (DeleteRoutineRequest) returns (StatusResponse);
  rpc GetTriggers   (Empty)                returns (GetTriggersResponse);
  rpc CreateTrigger (CreateTriggerRequest) returns (StatusResponse);
  rpc UpdateTrigger (UpdateTriggerRequest) returns (StatusResponse);
  rpc DeleteTrigger (DeleteTriggerRequest) returns (StatusResponse);

  // --- Settings (Admin-UI, #27 Phase 5) ---
  rpc GetSettings   (Empty)                returns (GetSettingsResponse);
  rpc UpdateConfig  (UpdateConfigRequest)  returns (StatusResponse);
  rpc CreateSetting (CreateSettingRequest) returns (CreateSettingResponse);
  rpc DeleteSetting (DeleteSettingRequest) returns (StatusResponse);

  // --- Car ---
  // Returns the current cached car state (available=false if no data received yet).
  rpc GetCarState      (Empty)            returns (CarStateResponse);
  // Returns all tracked car states (one per configured car).
  rpc GetAllCarStates  (Empty)            returns (GetAllCarStatesResponse);

  // --- Event stream ---
  // Opens a server-side stream; Hannah pushes events as they occur.
  // Pass event_types to filter (empty = all events).
  // Known event types: "car.parked", "resident.arrived", "resident.departed", "satellite.firmware"
  rpc SubscribeEvents (EventFilter)       returns (stream HannahEvent);

  // --- Firmware Manager ---
  // Trigger an immediate OTA update for a satellite (bypasses residents check).
  rpc TriggerFirmwareUpdate (TriggerFirmwareUpdateRequest) returns (StatusResponse);

  // --- Wakeword Capture ---
  // Put a satellite in audio-capture mode for wakeword training data collection.
  // While captured: wakeword detection is suspended, speaker is muted, DND is active.
  // Hannah relays raw PCM chunks from the satellite to the collector via StreamSatelliteAudio.
  // The stream stays open until the collector disconnects; Hannah then auto-releases the satellite.
  rpc RequestSatelliteCapture (SatelliteCaptureRequest) returns (SatelliteCaptureResponse);
  rpc ReleaseSatelliteCapture (SatelliteCaptureRequest) returns (StatusResponse);
  rpc StreamSatelliteAudio    (SatelliteCaptureRequest) returns (stream SatelliteAudioChunk);
  // Play a plink sound on the satellite, then hold virtual PTT for record_duration seconds.
  // Returns after PTT is released — Collector calls this in a loop for guided hey-hannah collection.
  rpc TriggerPlink (TriggerPlinkRequest) returns (StatusResponse);

  // --- Satellite Proxy (Go gRPC proxy) ---
  // Bidirectional keepalive stream. Proxy sends heartbeats; Hannah sends TTS
  // audio commands back (for announcements). While this stream is open, Hannah
  // disables its own UDP server. If the stream drops, Hannah re-enables UDP.
  rpc RegisterProxy       (stream ProxyHeartbeat)              returns (stream ProxyCommand);
  // Submit a complete satellite audio session for processing.
  // Hannah runs the full pipeline (STT → NLU → TTS → MQTT status) and returns
  // the result so the proxy can play TTS audio back to the satellite.
  rpc SubmitSatelliteAudio(SubmitSatelliteAudioRequest)        returns (SubmitSatelliteAudioResponse);
  // Notify Hannah that a satellite registered or disconnected via the proxy.
  // Hannah updates its room registry (hannah/rooms MQTT) immediately.
  rpc NotifySatelliteRegistered(SatelliteRegistration)         returns (StatusResponse);
  rpc NotifySatelliteGone      (SatelliteRegistration)         returns (StatusResponse);

  // --- Satellite Provisioning ---
  // Called by the ioBroker adapter before WebFlash to pre-register a seed + display name + room.
  // When the satellite first connects with that seed, Hannah links serial → pre-config and clears the seed.
  rpc ProvisionSatellite  (ProvisionSatelliteRequest)          returns (StatusResponse);

  // --- Speaker Enrollment ---
  rpc EnrollVoiceprint    (EnrollVoiceprintRequest)            returns (StatusResponse);

  // --- Timer Service ---
  // Bidirectional stream between the Hannah Timer Service and Hannah Core.
  // The Timer Service initiates the connection; if Hannah restarts, the service reconnects.
  // Hannah sends timer commands (create, cancel, list); the service fires events when timers expire.
  rpc TimerConnect (stream TimerMessage) returns (stream TimerCommand);

  // --- ioBroker Agent ---
  // Single bidirectional stream between the HannahAgent ioBroker adapter and Hannah Core.
  // The adapter pushes state updates (device states, presence, text commands);
  // Hannah pushes device-control commands and on-demand state-subscription requests back.
  // The adapter initiates the connection; if Hannah restarts, the adapter reconnects.
  rpc AgentConnect (stream AgentMessage) returns (stream AgentCommand);
}

// ============================================================
//  Shared
// ============================================================

message Empty {}

message StatusResponse {
  bool   ok      = 1;
  string message = 2;
}

// ============================================================
//  User Registry messages
// ============================================================

message User {
  int32  id              = 1;
  string user_name       = 2;
  string display_name    = 3;
  int32  trust_level     = 4;
  bool   active          = 5;
  // linked_accounts: service → account_id  (e.g. "telegram" → "123456789")
  map<string, string> linked_accounts = 6;
  bool   system_messages = 7;  // receives ioBroker/system notifications via Telegram
  string email           = 8;  // #27 Phase 6
  string type            = 9;  // "roomie" | "guest" | "pet", #27 Phase 6
}

message GetUsersRequest {
  bool include_inactive = 1;
}

message GetUsersResponse {
  repeated User users = 1;
}

// Exactly one of the lookup fields should be set.
message GetUserRequest {
  oneof lookup {
    string                user_name      = 1;
    int32                 id             = 2;
    LinkedAccountLookup   linked_account = 3;
  }
  // Only meaningful together with roomie_id: roomie_id alone is not unique across
  // types (a Guest and a Roomie can share a name). Leave UNSPECIFIED if there's no
  // collision; required when one exists, otherwise the RPC fails with
  // FAILED_PRECONDITION naming the colliding types.
  ResidentType type = 4;
}

message LinkedAccountLookup {
  string provider    = 1;
  string external_id = 2;
}

message UserResponse {
  bool found = 1;
  User user  = 2;  // only valid when found == true
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LinkAccountRequest {
  int32  user_id          = 1;
  string service          = 2;
  string account_id       = 3;
  string provider_payload  = 4;
}

message UnlinkAccountRequest {
  int32  user_id    = 1;
  string service    = 2;
  string account_id = 3;
}

message SetTrustLevelRequest {
  int32  user_id    = 1;
  int32  level      = 2;  // clamped to [0, 10]
}

message SetSystemMessagesRequest {
  // Always called by the user for themselves, identified beforehand via a unique
  // linked-account lookup (GetUserRequest.linked_account) — id is already known
  // and unambiguous, unlike roomie_id which can collide across resident types.
  int32  user_id  = 1;
  bool   enabled  = 2;
}

// --- User-Verwaltung (Admin-UI, #27 Phase 6) ---

message CreateUserRequest {
  string username     = 1;
  string password     = 2;  // Klartext, wird serverseitig gehasht — gleicher akzeptierter Constraint wie LoginRequest
  string email        = 3;
  string display_name = 4;
  string type         = 5;  // "roomie" | "guest" | "pet"
}

message CreateUserResponse {
  bool   ok      = 1;
  int32  id      = 2;  // server-assigned, only valid when ok == true
  string message = 3;
}

message UpdateUserRequest {
  int32  user_id      = 1;
  string display_name = 2;
  string email        = 3;
  string type         = 4;
  bool   is_active    = 5;
  string password     = 6;  // Klartext, "" = unverändert
}

message DeleteUserRequest {
  int32 user_id = 1;
}

message Resident {
  string id           = 1;  // z.B. "leonie_roomie" — roomie_id + "_" + type
  string roomie_id    = 2;
  string display_name = 3;
  string type         = 4;  // "roomie" | "guest" | "pet"
  bool   home         = 5;
}

message GetResidentsResponse {
  repeated Resident residents = 1;
}

// ============================================================
//  Control messages
// ============================================================

message SubmitTextRequest {
  string text            = 1;
  // Identifies the calling service and its user, so Hannah can look up
  // the corresponding roomie via linked_accounts.
  string source_service  = 2;  // e.g. "telegram"
  string source_user_id  = 3;  // e.g. Telegram chat_id as string
}

message SubmitTextResponse {
  string answer      = 1;  // text to send back to the user
  string intent_name = 2;  // e.g. "WeatherQuery", "TurnOn", "Unknown"
}

message SubmitVoiceRequest {
  bytes  audio           = 1;  // OGG/Opus audio bytes (from Telegram voice message)
  string source_service  = 2;  // e.g. "telegram"
  string source_user_id  = 3;  // e.g. Telegram chat_id as string
}

message SubmitVoiceResponse {
  string transcript  = 1;  // STT result (for display / caption)
  string answer      = 2;  // text answer from Hannah
  string intent_name = 3;  // e.g. "CarQuery" — caller may enrich the text reply
  bytes  audio_ogg   = 4;  // OGG/Opus TTS response (empty if TTS disabled or failed)
}

message AnnounceRequest {
  string text   = 1;
  string device = 2;  // satellite device name, or "all" for broadcast
}

message Satellite {
  string device_id    = 1;
  string room         = 2;   // live-reported room (UDP/proxy registration); empty if not connected
  string address      = 3;   // IP:port of the UDP satellite; empty if not connected
  reserved 4;
  reserved "serial";         // removed: device_id is the hardware serial since v0.34
  string display_name = 5;   // human-readable name from Core DB (empty if not provisioned)
  string room_id            = 6;   // room assigned in Core DB, "" = unassigned
  string room_display_name  = 7;   // display name of room_id
  string last_seen           = 8;  // UTC "YYYY-MM-DD HH:MM:SS" from Core DB, "" = never seen
  bool   connected            = 9;  // true if currently live (UDP or proxy)
  bool   room_mismatch        = 10; // true if connected and live room differs from room_id
}

message GetSatellitesResponse {
  repeated Satellite satellites = 1;
}

message SetSatelliteRoomRequest {
  string device_id = 1;
  string room_id    = 2;  // "" = unassign
}

message SetSatelliteDisplayNameRequest {
  string device_id    = 1;
  string display_name = 2;
}

// --- Rooms/Groups (Admin-UI, #27 Phase 1) ---

message Room {
  string room_id      = 1;
  string display_name = 2;
}

message GetRoomsResponse {
  repeated Room rooms = 1;
}

message Group {
  string group_id     = 1;
  string display_name = 2;
  repeated Room rooms = 3;
}

message GetGroupsResponse {
  repeated Group groups = 1;
}

message CreateGroupRequest {
  string group_id     = 1;
  string display_name = 2;
}

message UpdateGroupRequest {
  string group_id     = 1;
  string display_name = 2;
}

message DeleteGroupRequest {
  string group_id = 1;
}

message SetGroupRoomsRequest {
  string group_id          = 1;
  repeated string room_ids = 2;
}

// --- Routines/Triggers (Admin-UI, #27 Phase 4) ---
//
// `actions`/`when`/`cancel_when`/`on_response` stay JSON-encoded strings rather than
// structured messages: `actions` is a union of two shapes ({say,room} or {topic,value},
// see routines.py's `_load()`), and the trigger condition tree (`when`/`cancel_when`/
// `on_response`) is deliberately open-ended (also/unless/time/days/condition strings,
// see trigger_engine.py's module docstring) - modeling it as proto would force a schema
// change on every new condition kind. Kept consistent with LinkedAccount.provider_payload.

message Routine {
  int32  id                = 1;
  string name              = 2;
  repeated string triggers = 3;
  string actions_json      = 4;  // JSON list[{topic,value} | {say,room}]
  string reply             = 5;
}

message GetRoutinesResponse {
  repeated Routine routines = 1;
}

message CreateRoutineRequest {
  string name              = 1;
  repeated string triggers = 2;
  string actions_json      = 3;
  string reply             = 4;
}

message CreateRoutineResponse {
  bool   ok      = 1;
  int32  id      = 2;  // server-assigned, only valid when ok == true
  string message = 3;
}

message UpdateRoutineRequest {
  int32  id                = 1;
  string name              = 2;
  repeated string triggers = 3;
  string actions_json      = 4;
  string reply             = 5;
}

message DeleteRoutineRequest {
  int32 id = 1;
}

message Trigger {
  string id               = 1;  // client-assigned slug, e.g. "aussentuer_abend"
  string when_json        = 2;  // JSON condition object or list (OR'd), see trigger_engine.py
  string cancel_when_json = 3;  // JSON condition object, "" = none
  string on_response_json = 4;  // JSON list of response rules, "" = none
  string say              = 5;  // legacy single announcement, "" once actions_json is used
  string ask              = 6;
  bool   rephrase         = 7;
  string room             = 8;
  int32  cooldown         = 9;
  string delay            = 10; // duration string e.g. "5h"/"30m"/"90s", "" = none
  string actions_json     = 11; // JSON list[{say,room} | {set_state:{id,value}}], "" = none (falls back to say)
}

message GetTriggersResponse {
  repeated Trigger triggers = 1;
}

message CreateTriggerRequest {
  string id               = 1;
  string when_json        = 2;
  string cancel_when_json = 3;
  string on_response_json = 4;
  string say              = 5;
  string ask              = 6;
  bool   rephrase         = 7;
  string room             = 8;
  int32  cooldown         = 9;
  string delay            = 10;
  string actions_json     = 11;
}

message UpdateTriggerRequest {
  string id               = 1;
  string when_json        = 2;
  string cancel_when_json = 3;
  string on_response_json = 4;
  string say              = 5;
  string ask              = 6;
  bool   rephrase         = 7;
  string room             = 8;
  int32  cooldown         = 9;
  string delay            = 10;
  string actions_json     = 11;
}

message DeleteTriggerRequest {
  string id = 1;
}

// --- Settings (Admin-UI, #27 Phase 5) ---

message Category {
  int32  id        = 1;
  string name      = 2;  // voller Punkt-Pfad, z.B. "ble.tags"
  int32  parent_id = 3;  // 0 = keine Eltern-Kategorie (Root)
}

message Setting {
  int32  id          = 1;
  int32  category_id = 2;
  string name        = 3;
  string value       = 4;  // JSON-encoded
}

message GetSettingsResponse {
  repeated Category categories = 1;
  repeated Setting settings    = 2;
}

message SettingUpdate {
  int32  setting_id = 1;
  string value      = 2;  // JSON-encoded
}

message UpdateConfigRequest {
  repeated SettingUpdate updates = 1;
}

message CreateSettingRequest {
  int32  category_id = 1;
  string name        = 2;
  string value       = 3;
}

message CreateSettingResponse {
  bool   ok      = 1;
  int32  id      = 2;
  string message = 3;
}

message DeleteSettingRequest {
  int32 setting_id = 1;
}

// ============================================================
//  Car state messages
// ============================================================

message CarStateResponse {
  bool         available = 1;  // false if no MQTT data received yet
  CarStateProto state    = 2;
}

message GetAllCarStatesResponse {
  repeated CarStateProto states = 1;
}

message CarStateProto {
  // position
  float  latitude      = 1;
  float  longitude     = 2;
  string address       = 3;
  bool   is_moving     = 4;
  int64  position_date = 5;   // Unix timestamp (seconds)

  // status
  int32  odometer         = 6;
  int32  total_range      = 7;
  bool   is_car_locked    = 8;
  string door_lock_status = 9;
  string overall_status   = 10;

  // doors/windows: name → true (closed) / false (open)
  map<string, bool> doors   = 11;
  map<string, bool> windows = 12;

  // Roomie-ID des Fahrzeughalters (leer = kein Owner-Filter)
  string owner_roomie = 13;

  // Metadaten
  string display_name = 14;  // z.B. "Leonies Golf"
  string plate        = 15;  // Nummernschild
  string vin          = 16;  // Fahrzeug-Identifikationsnummer
  string home_address = 17;  // Heimadresse für "steht zu Hause"-Erkennung
}

// ============================================================
//  Event stream messages
// ============================================================

message EventFilter {
  // If empty, subscribe to all event types.
  repeated string event_types = 1;
}

message HannahEvent {
  string event_type = 1;   // "car.parked" | "resident.arrived" | "resident.departed" | "system.notification" | "satellite.firmware"
  string timestamp  = 2;   // ISO 8601 UTC

  oneof payload {
    CarStateProto            car_state            = 10;
    ResidentEventProto       resident_event       = 11;
    SystemNotificationEvent  system_notification  = 12;
    FirmwareEventProto       firmware_event       = 13;
  }
}

message SystemNotificationEvent {
  string text = 1;  // LLM-reformulierter Benachrichtigungstext
}

message FirmwareEventProto {
  string device  = 1;
  string version = 2;
}

message TriggerFirmwareUpdateRequest {
  string device = 1;
}

message ResidentEventProto {
  string roomie_id    = 1;
  string display_name = 2;
  string event        = 3;   // "arrived" | "departed"
}

// ============================================================
//  Satellite Proxy messages (Go gRPC proxy ↔ Hannah Core)
// ============================================================

// Sent by the proxy periodically to keep the RegisterProxy stream alive.
message ProxyHeartbeat {
  string proxy_id = 1;   // human-readable identifier, e.g. "hannah-proxy-living-room"
  // UDP address the proxy is listening on for satellite connections.
  // When set, Hannah publishes this address to the discovery topic so
  // satellites connect to the proxy instead of Hannah's own UDP server.
  string udp_host = 2;   // advertise host, e.g. "192.168.8.5"
  int32  udp_port = 3;   // UDP port, e.g. 7775
}

// Sent by Hannah to the proxy over the RegisterProxy stream.
message ProxyCommand {
  oneof command {
    ProxyAck         ack        = 1;  // initial confirmation when stream is established
    PlayAudioCommand play_audio = 2;  // Hannah wants the proxy to play TTS on a satellite
  }
}

// Sent once by Hannah after RegisterProxy stream is established.
message ProxyAck {
  bool   udp_disabled = 1;  // true = Hannah has disabled its own UDP server
  string message      = 2;  // human-readable status, e.g. "UDP server stopped"
}

// Hannah instructs the proxy to play TTS audio on a specific satellite.
// Used for announcements and other server-initiated audio.
// For streaming: Hannah sends multiple PlayAudioCommands with chunks of PCM.
// is_last=true on the final chunk signals the proxy to send tts_end to the satellite.
message PlayAudioCommand {
  string device_id   = 1;  // satellite device name (as registered via UDP or proxy)
  bytes  audio_pcm   = 2;  // raw PCM, 16-bit signed mono
  int32  sample_rate = 3;  // e.g. 24000 (Azure) or 16000 (Piper)
  bool   is_last     = 4;  // true on the last chunk of a TTS response
}

// Sent by the proxy when a satellite has finished recording an utterance.
message SubmitSatelliteAudioRequest {
  string device_id    = 1;  // satellite device name
  string room         = 2;  // room name (from proxy registration / config)
  bytes  audio_pcm    = 3;  // raw PCM, 16-bit signed mono, 16000 Hz
  int32  sample_rate  = 4;  // sample rate of the audio (typically 16000)
  // Optional: speaker identity (Hannah users.id) provided by an upstream speaker-ID service.
  // Empty = anonymous (Hannah treats as unknown user).
  string speaker_user_id = 5;
}

message SubmitSatelliteAudioResponse {
  string transcript  = 1;  // STT result
  string answer      = 2;  // text answer from Hannah
  string intent_name = 3;  // e.g. "TurnOn", "CarQuery", "Unknown"
  bytes  audio_pcm   = 4;  // TTS response as raw PCM, 16-bit signed mono
  int32  sample_rate = 5;  // sample rate of audio_pcm
}

// ============================================================
//  Device Control Menu messages
// ============================================================

message DeviceInfo {
  string id       = 1;  // full device prefix, e.g. "javascript.0.virtualDevice.Licht.EG.Wohnzimmer.DeckeSeite"
  string name     = 2;  // display name, e.g. "DeckeSeite"
  string category = 3;  // e.g. "Licht", "Stecker", "Temperaturen"
  repeated string states = 4;       // available state keys: "on", "level", "color", …
  map<string, string> current = 5;  // current values as strings, e.g. {"on": "true", "level": "75"}
}

message RoomInfo {
  string key              = 1;  // room_id (lowercase), e.g. "wohnzimmer"
  string name             = 2;  // display name, e.g. "Wohnzimmer"
  repeated DeviceInfo devices = 3;
}

message GetDevicesResponse {
  repeated RoomInfo rooms = 1;
}

message ControlDeviceRequest {
  string device_id = 1;  // DeviceInfo.id
  string state     = 2;  // state key: "on", "level", "color"
  string value     = 3;  // string-serialised value: "true", "false", "50", "#FF0000"
}

// ============================================================
//  Satellite Provisioning messages
// ============================================================

// Sent by the ioBroker adapter (WebFlasher) before flashing a satellite.
// Hannah stores the seed + pre-config; when the satellite first connects with
// this seed, Hannah links the hardware serial to the pre-config and clears the seed.
message ProvisionSatelliteRequest {
  string seed         = 1;  // random UUID, also written to NVS during flash
  string display_name = 2;  // pre-configured display name
  string room_id      = 3;  // optional: pre-configured room (room_id from ioBroker)
}

// ============================================================
//  Speaker Enrollment messages
// ============================================================

message EnrollVoiceprintRequest {
  string user_id     = 1;  // Hannah user this voice sample belongs to (users.id, stable)
  bytes  audio_pcm   = 2;  // raw PCM, 16-bit signed mono
  int32  sample_rate = 3;  // e.g. 16000
}

// ============================================================
//  Satellite Proxy registration messages
// ============================================================

message SatelliteRegistration {
  string device_id = 1;  // satellite device_id (== eFuse MAC since v0.34), e.g. "e072a1d01adc"
  reserved 2;
  reserved "room";       // removed: RoomManager is the sole authority for room assignment
  string address   = 3;  // IP of the UDP satellite as seen by the proxy, e.g. "192.168.8.42"
  reserved 4;
  reserved "serial";     // removed: device_id is the hardware serial since v0.34
  string seed      = 5;  // one-time pairing token from NVS (empty after successful pairing)
}

// ============================================================
//  ioBroker Agent messages
// ============================================================

// Sent by the HannahAgent ioBroker adapter over the AgentConnect stream.
message AgentMessage {
  oneof payload {
    AgentStateUpdate      state_update      = 1;  // any ioBroker state changed
    AgentResident         resident_update   = 2;  // residents adapter presence changed
    AgentTextCommand      text_command      = 3;  // text command state changed
    AgentSatelliteControl satellite_control = 4;  // satellite control command
    AgentDeviceSnapshot   send_snapshot     = 5;  // initial snapshot with all states
    AgentResidentSnapshot send_residents    = 6;  // initial snapshot with all residents
    AgentAskResident      ask_resident      = 7;  // ask Resident via Hannah
    AgentRoomSnapshot     send_rooms        = 8;  // full room catalog, independent of devices
  }
}

// Adapter instructs Hannah to control satellites in a room or a specific satellite.
// room: room_id (enum ID segment) or "all" for all rooms.
// device_id: if non-empty, only the named satellite is targeted (volume/mute only);
//            room is still required (used for room-scoped commands and as fallback).
message AgentSatelliteControl {
  string room      = 1;
  string device_id = 7;  // optional: target a specific satellite instead of the whole room
  oneof control {
    bool   dnd                    = 2;  // set do-not-disturb
    bool   mute                   = 3;  // mute/unmute microphone
    int32  volume                 = 4;  // set volume (0–100)
    string announcement           = 5;  // speak plain-text announcement (verbatim)
    string announcement_ssml      = 6;  // speak SSML announcement
    string announcement_rephrase  = 8;  // speak announcement, text rephrased by LLM first
  }
}

// An ioBroker state change event. ack=true means the device confirmed the value
// (as opposed to ack=false which is the "desired" value). Hannah uses this to
// verify that a SetState command was executed successfully.
message AgentStateUpdate {
  string state_id = 1;  // full ioBroker state ID, e.g. "javascript.0.virtualDevice.Licht.EG.Wohnzimmer.DeckeSeite.on"
  string value    = 2;  // JSON-encoded value: "true", "42", "\"text\""
  bool   ack      = 3;  // true = confirmed by device
  int64  ts       = 4;  // Unix timestamp in milliseconds
}

enum ResidentType {
  RESIDENT_TYPE_UNSPECIFIED = 0;
  ROOMIE                    = 1;
  GUEST                     = 2;
  PET                       = 3;
}

// The text-command state in ioBroker changed — treat as a SubmitText call.
message AgentTextCommand {
  string text = 1;
}

// Sent by Hannah Core over the AgentConnect stream.
message AgentCommand {
  oneof command {
    AgentSetState        set_state        = 1;  // Hannah wants to control an ioBroker device
    AgentWatchMore       watch_more       = 2;  // Hannah needs additional states streamed
    AgentSetResident     set_resident     = 3;  // Hannah wants to set a resident's presence state
    AgentSatelliteUpdate satellite_update = 4;  // a satellite registered or disconnected
    AgentTextAnswer      text_answer      = 5;  // Hannah's answer to a text command
    AgentFirmwareEvent   firmware_event   = 6;  // satellite firmware version update
    AgentBleUpdate          ble_update          = 7;  // BLE tag location changed
    AgentSensorUpdate       sensor_update       = 8;  // satellite sensor reading
    AgentResidentAnswered   resident_answered   = 9;  // answer to an ask_resident request
    AgentSatelliteDeleted   satellite_deleted   = 10; // Hannah Core deleted a satellite — adapter must remove its object tree
    AgentSetResidentMood    set_resident_mood   = 11; // Hannah wants to set a resident's mood, independent of presence
  }
}

message AgentFirmwareEvent {
  string device           = 1;
  string version          = 2;
  bool   update_available = 3;  // true = newer version pending, false = current version report
}

// Hannah instructs the adapter to set an ioBroker state.
// The adapter calls setForeignState(); the resulting ack=true AgentStateUpdate
// confirms execution back to Hannah.
message AgentSetState {
  string state_id = 1;  // ioBroker state ID to write
  string value    = 2;  // JSON-encoded value
}

// Hannah requests additional state IDs to be included in the AgentStateUpdate stream.
// Used by the trigger engine at runtime when triggers reference arbitrary state IDs
// (e.g. unless.state: "0_userdata.0.feeded") that aren't covered by enum discovery.
message AgentWatchMore {
  repeated string state_ids = 1;
}

// Hannah instructs the adapter to set a resident's presence state in the residents adapter.
// type determines whether the target path is .roomie./.guest./.pet.
message AgentSetResident {
  string resident_id    = 1;  // e.g. "leonie", "hannah"
  int32  presence_state = 2;  // residents adapter presence value (0=absent, 1=home, …)
  ResidentType type     = 3;
}

// Hannah instructs the adapter to set a resident's mood — separate command from
// AgentSetResident so it can fire independent of any presence change (e.g. when a
// Hannah User's linked mood changes without an arrival/departure).
message AgentSetResidentMood {
  string resident_id = 1;  // e.g. "leonie", "hannah"
  int32  mood        = 2;
  ResidentType type  = 3;
}

// Hannah notifies the adapter that a satellite registered or disconnected,
// or that a satellite's volume or mute state changed.
// The adapter updates hannah.<instance>.satellites.rooms.<room_id>.* states accordingly.
message AgentSatelliteUpdate {
  string device_id    = 1;  // satellite device_id (== eFuse MAC since v0.34); adapter uses as ioBroker object-ID
  string room         = 2;  // room_id: stable enum ID segment (e.g. "wohnzimmer"); adapter uses as ioBroker path segment
  string address      = 3;  // UDP address (empty if not applicable)
  bool   online       = 4;  // true = registered/online, false = gone/offline
  optional int32 volume = 5;  // current volume level (0–100); absent = no change
  optional bool  mute   = 6;  // current mute state; absent = no change
  reserved 7;
  reserved "serial";          // removed: device_id is the hardware serial since v0.34
  string display_name = 8;  // human-readable name from Core DB (empty = fall back to device_id)
}

// Hannah Core deleted a satellite (RoomManager.delete_satellite()) — the adapter
// must remove the satellite's full object tree (and its sensor tree), mirroring
// the room cleanup AgentSatelliteUpdate already does for online/offline changes.
message AgentSatelliteDeleted {
  string device_id = 1;  // satellite device_id being deleted
  string room      = 2;  // room_id the satellite was assigned to, for room-container cleanup
}

// Hannah sends the answer to a text command back to the adapter.
// The adapter sets hannah.<instance>.textAnswer accordingly.
message AgentTextAnswer {
  string text   = 1;  // plain-text answer
  string intent = 2;  // detected intent name
}

// A notification from the ioBroker adapter.
// direct=true: skip LLM, play text unchanged (severity ignored).
// direct=false: LLM reformulates text; severity controls tone ("alert"|"notify"|"info").
message AgentNotification {
  string text     = 1;
  bool   direct   = 2;
  string severity = 3;  // "alert" | "notify" | "info" — only used when direct=false
}

message AgentStateValue {
    string value = 1;
    bool ack      = 2;
}

// A device from the ioBroker adapter
message AgentDevice {
    string state_id  = 1;
    string floor     = 2;
    string room      = 3;  // room_id: stable enum ID segment, e.g. "wohnzimmer" or "living_room"
    string device    = 4;
    string device_type        = 5;
    repeated string functions = 6;
    AgentStateValue value     = 7;
    map<string, string> room_names = 8;  // all display names from ioBroker enum, e.g. {"de": "Wohnzimmer", "en": "Living Room"}
}

// a list with all known devices from the ioBroker adapter
message AgentDeviceSnapshot {
    repeated AgentDevice devices = 1;
}

// A room from the ioBroker adapter's enum.rooms.* catalog — independent of devices,
// so rooms without any device yet are still known to Hannah (e.g. before the first
// satellite is provisioned into a brand-new room).
message AgentRoom {
    string room_id = 1;  // enum ID segment, e.g. "wohnzimmer"
    map<string, string> display_names = 2;  // all display names from ioBroker enum, e.g. {"de": "Wohnzimmer", "en": "Living Room"}
}

// Full room catalog from the ioBroker adapter. Sent on AgentConnect and whenever
// enum.rooms.* changes, independent of AgentDeviceSnapshot.
message AgentRoomSnapshot {
    repeated AgentRoom rooms = 1;
}

// A resident from the ioBroker adapter
message AgentResident {
  string roomie_id          = 1;
  string name               = 2;
  ResidentType type         = 3;
  optional int32 mood_level = 4;
  int32 presence_state      = 5;
}

// a list with all known residents
message AgentResidentSnapshot {
  repeated AgentResident residents = 1;
}

message AgentAskResident {
  string correlation_id = 3;
  string room           = 1;
  string question       = 2;
}

message AgentResidentAnswered {
  string correlation_id = 1;
  string answer         = 2;
}

// Hannah notifies the adapter that a BLE tag's location has changed.
// The adapter creates/updates states under hannah.<instance>.ble.<label>.*.
// room and satellite are empty when the tag is no longer visible.
message AgentBleUpdate {
  string label     = 1;  // human-readable tag name (from config, used as state path)
  string mac       = 2;  // MAC address (lowercase, colon-separated)
  string room      = 3;  // room name (empty = tag not visible / stale)
  string satellite = 4;  // satellite device ID that last detected the tag
  int32  rssi      = 5;  // last known RSSI in dBm (0 when room is empty)
}
// Hannah notifies the adapter of a satellite's sensor reading.
// The adapter creates/updates states under hannah.<instance>.satellites.<device>.sensors.*.
// gas_resistance is omitted (0.0) when not available (BMP280+AHT20 hardware).
// iaq/co2_equiv/voc_equiv are omitted (0.0) when BSEC2 is not calibrated yet.
message AgentSensorUpdate {
  reserved 5;
  reserved "gas_resistance";  // removed: BSEC2 replaces raw VOC resistance
  string device          = 1;  // satellite device ID
  float  temperature     = 2;  // °C
  float  pressure        = 3;  // hPa
  float  humidity        = 4;  // % relative humidity (0 when not available)
  float  iaq             = 6;  // IAQ 0–500 (BSEC2); 0 when not calibrated
  uint32 iaq_accuracy    = 7;  // 0=uncertain 1=low 2=medium 3=high
  float  co2_equiv       = 8;  // CO₂ equivalent ppm (BSEC2); 0 when not available
  float  voc_equiv       = 9;  // breath VOC equivalent ppm (BSEC2); 0 when not available
}

// ============================================================
//  Wakeword Capture messages (Wakeword Collector ↔ Hannah Core)
// ============================================================

message SatelliteCaptureRequest {
  string device_id   = 1;
  // "noise" (default) or "hey_hannah" — controls ESP streaming behaviour.
  // noise: continuous auto-flush every 5 s.
  // hey_hannah: stream only while PTT is held, flush on PTT release.
  string sample_type = 2;
}

message TriggerPlinkRequest {
  string device_id       = 1;
  float  record_duration = 2;  // seconds to hold virtual PTT after plink (default 3.0)
}

// ok=false when the satellite is unknown or already captured by another client.
message SatelliteCaptureResponse {
  bool   ok    = 1;
  string error = 2;
}

// A single audio chunk streamed from a captured satellite to the collector.
// end_of_utterance=true marks a PTT-release boundary — the collector should
// finalise and save the accumulated audio as a labelled sample at that point.
message SatelliteAudioChunk {
  bytes pcm              = 1;  // raw PCM, 16-bit signed mono
  int32 sample_rate      = 2;  // Hz, typically 16000
  bool  end_of_utterance = 3;  // true = PTT released, utterance boundary
}

// ============================================================
//  Timer Service messages (Hannah Timer Service ↔ Hannah Core)
// ============================================================

// Sent by Hannah Core over the TimerConnect stream.
message TimerCommand {
  oneof command {
    TimerCreate      create    = 1;  // create a new timer
    TimerCancel      cancel    = 2;  // cancel an existing timer
    TimerListRequest list      = 3;  // request current timer list
    TimerReady       ready     = 4;  // Hannah is ready to receive pending fired events
    TimerNotReady    not_ready = 5;  // Hannah is temporarily unable to process timer firings
  }
}

// Hannah signals that she is ready to receive queued TimerFired events.
// Sent after startup once ioBroker states are loaded. The service flushes
// any TimerFired events that occurred while Hannah was offline, in order.
message TimerReady {}

// Hannah signals a temporary degraded state — the Timer Service should hold
// any TimerFired events in its queue until a subsequent TimerReady is received.
// Hannah sends this when core subsystems are unavailable (e.g. ioBroker disconnected).
message TimerNotReady {
  optional string reason = 1;  // human-readable reason, e.g. "ioBroker disconnected"
}

// Hannah instructs the timer service to create a new timer.
message TimerCreate {
  string           timer_id  = 1;  // UUID assigned by Hannah
  string           label     = 2;  // human-readable label, e.g. "Spazieren gehen"
  int64            fire_at   = 3;  // Unix timestamp (seconds) when to fire
  string           room      = 4;  // room to announce in, or "all"
  optional string  roomie_id = 5;  // optional: which user set the timer
}

// Hannah instructs the timer service to cancel a timer.
message TimerCancel {
  string timer_id = 1;
}

// Hannah requests the current list of active timers (e.g. "welche Timer habe ich?").
message TimerListRequest {}

// Sent by the Timer Service over the TimerConnect stream.
message TimerMessage {
  oneof payload {
    TimerAck          ack   = 1;  // initial confirmation when stream is established
    TimerFired        fired = 2;  // a timer has expired
    TimerListResponse list  = 3;  // response to TimerListRequest
  }
}

// Sent once by the Timer Service after TimerConnect stream is established.
message TimerAck {
  string message       = 1;  // human-readable status
  int32  active_timers = 2;  // number of timers currently tracked
}

// Timer Service notifies Hannah that a timer has expired.
// Hannah looks up the timer_id in its own store to determine what to announce and where.
message TimerFired {
  string timer_id = 1;
  string label    = 2;  // convenience copy for logging; Hannah has it in its own store
}

// Response to TimerListRequest — used for sync and "welche Timer habe ich?" queries.
message TimerListResponse {
  repeated TimerInfo timers = 1;
}

message TimerInfo {
  string           timer_id  = 1;
  string           label     = 2;
  int64            fire_at   = 3;  // Unix timestamp (seconds)
  string           room      = 4;
  optional string  roomie_id = 5;
}
