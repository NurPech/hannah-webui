{% extends "base.html" %}
{% block title %}Mein Konto{% endblock %}
{% block content %}
<div class="bg-gray-900 border border-gray-800 rounded-xl p-4 mb-4">
  <h2 class="text-lg font-semibold text-gray-100 mb-1">Hallo, {{ display_name }}!</h2>
  <p class="text-sm text-gray-500">Hier entsteht die neue Hannah-WebUI.</p>
</div>

<div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
  <h3 class="text-sm font-semibold text-gray-100 mb-3">Passwort ändern</h3>
  <form method="post" action="{{ url_for('update_my_password') }}">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Neues Passwort</label>
        <input type="password" name="password" required
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 transition-colors">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Wiederholen</label>
        <input type="password" name="password_confirm" required
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 transition-colors">
      </div>
    </div>
    <div class="flex gap-2 mt-5">
      <button class="bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg px-3 py-1.5 text-sm font-medium transition-colors">Speichern</button>
    </div>
  </form>
</div>
{% endblock %}
