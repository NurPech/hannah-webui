{% extends "base.html" %}
{% block title %}User anlegen{% endblock %}
{% block content %}
<div class="mb-3">
  <a href="{{ url_for('users') }}" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">← User</a>
</div>

<h2 class="text-lg font-semibold text-gray-100 mb-5">User anlegen</h2>

<div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
  <form method="post" action="{{ url_for('create_user') }}">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Username</label>
        <input type="text" name="username" required
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 transition-colors">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Anzeigename</label>
        <input type="text" name="display_name" placeholder="Default: Username"
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 transition-colors">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">E-Mail</label>
        <input type="email" name="email" required
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 transition-colors">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Passwort</label>
        <input type="password" name="password" required
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 transition-colors">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Typ</label>
        <select name="type"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 transition-colors">
          {% for t in types %}
          <option value="{{ t }}">{{ t }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="flex gap-2 mt-5">
      <button class="bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg px-3 py-1.5 text-sm font-medium transition-colors">Anlegen</button>
      <a href="{{ url_for('users') }}"
         class="bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-300 transition-colors">Abbrechen</a>
    </div>
  </form>
</div>
{% endblock %}
