syntax = "proto3";

package hannah;

option go_package = "dev.kernstock.net/gessinger/voice/hannah/proxy/proto/hannah";

message DeviceInfo {
  string id       = 1;  // full device prefix, e.g. "javascript.0.virtualDevice.Licht.EG.Wohnzimmer.DeckeSeite"
  string name     = 2;  // display name, e.g. "DeckeSeite"
  string category = 3;  // e.g. "Licht", "Stecker", "Temperaturen"
  repeated string states = 4;       // available state keys: "on", "level", "color", …
  map<string, string> current = 5;  // current values as strings, e.g. {"on": "true", "level": "75"}
}

message RoomInfo {
  string key              = 1;  // room_id (lowercase), e.g. "wohnzimmer"
  string name             = 2;  // display name, e.g. "Wohnzimmer"
  repeated DeviceInfo devices = 3;
}

message GetDevicesResponse {
  repeated RoomInfo rooms = 1;
}

message ControlDeviceRequest {
  string device_id = 1;  // DeviceInfo.id
  string state     = 2;  // state key: "on", "level", "color"
  string value     = 3;  // string-serialised value: "true", "false", "50", "#FF0000"
}
