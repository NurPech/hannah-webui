syntax = "proto3";

package hannah;

option go_package = "dev.kernstock.net/gessinger/voice/hannah/proxy/proto/hannah";

// Sent by the proxy periodically to keep the RegisterProxy stream alive.
message ProxyHeartbeat {
  string proxy_id = 1;   // human-readable identifier, e.g. "hannah-proxy-living-room"
  // UDP address the proxy is listening on for satellite connections.
  // When set, Hannah publishes this address to the discovery topic so
  // satellites connect to the proxy instead of Hannah's own UDP server.
  string udp_host = 2;   // advertise host, e.g. "192.168.8.5"
  int32  udp_port = 3;   // UDP port, e.g. 7775
}

// Sent by Hannah to the proxy over the RegisterProxy stream.
message ProxyCommand {
  oneof command {
    ProxyAck         ack        = 1;  // initial confirmation when stream is established
    PlayAudioCommand play_audio = 2;  // Hannah wants the proxy to play TTS on a satellite
  }
}

// Sent once by Hannah after RegisterProxy stream is established.
message ProxyAck {
  bool   udp_disabled = 1;  // true = Hannah has disabled its own UDP server
  string message      = 2;  // human-readable status, e.g. "UDP server stopped"
}

// Hannah instructs the proxy to play TTS audio on a specific satellite.
// Used for announcements and other server-initiated audio.
// For streaming: Hannah sends multiple PlayAudioCommands with chunks of PCM.
// is_last=true on the final chunk signals the proxy to send tts_end to the satellite.
message PlayAudioCommand {
  string device_id   = 1;  // satellite device name (as registered via UDP or proxy)
  bytes  audio_pcm   = 2;  // raw PCM, 16-bit signed mono
  int32  sample_rate = 3;  // e.g. 24000 (Azure) or 16000 (Piper)
  bool   is_last     = 4;  // true on the last chunk of a TTS response
}

// Sent by the proxy when a satellite has finished recording an utterance.
message SubmitSatelliteAudioRequest {
  string device_id    = 1;  // satellite device name
  string room         = 2;  // room name (from proxy registration / config)
  bytes  audio_pcm    = 3;  // raw PCM, 16-bit signed mono, 16000 Hz
  int32  sample_rate  = 4;  // sample rate of the audio (typically 16000)
  // Optional: speaker identity (Hannah users.id) provided by an upstream speaker-ID service.
  // Empty = anonymous (Hannah treats as unknown user).
  string speaker_user_id = 5;
}

message SubmitSatelliteAudioResponse {
  string transcript  = 1;  // STT result
  string answer      = 2;  // text answer from Hannah
  string intent_name = 3;  // e.g. "TurnOn", "CarQuery", "Unknown"
  bytes  audio_pcm   = 4;  // TTS response as raw PCM, 16-bit signed mono
  int32  sample_rate = 5;  // sample rate of audio_pcm
}

message SatelliteRegistration {
  string device_id = 1;  // satellite device_id (== eFuse MAC since v0.34), e.g. "e072a1d01adc"
  reserved 2;
  reserved "room";       // removed: RoomManager is the sole authority for room assignment
  string address   = 3;  // IP of the UDP satellite as seen by the proxy, e.g. "192.168.8.42"
  reserved 4;
  reserved "serial";     // removed: device_id is the hardware serial since v0.34
  string seed      = 5;  // one-time pairing token from NVS (empty after successful pairing)
}
